<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <title>Honor Invest Pro</title>
    <style>
        :root {
            --bg-black: #000000;
            --text-primary: #FFFFFF;
            --text-dim: #777777;
            --honor-blue: #3b82f6;
            --status-green: #00e676;
            --status-red: #ff3b3b;
            --card-bg: #0c0c0c;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; color: white; }
        body { background-color: var(--bg-black); overflow-x: hidden; padding-bottom: 40px; }

        .container { padding: 18px; max-width: 500px; margin: auto; }

        /* Sync Bar */
        #sync-bar { position: fixed; top: 0; left: 0; width: 100%; height: 3px; background: #111; z-index: 2000; }
        #sync-fill { width: 0%; height: 100%; background: var(--honor-blue); transition: width 0.3s; }

        /* Header / Search Area Style */
        .header-area { margin-bottom: 20px; border-radius: 18px; background: #111; padding: 10px 15px; border: 1px solid #222; }

        /* Main Hero - 26px corners */
        .hero { 
            background: linear-gradient(135deg, #111, #000); 
            border-radius: 26px; padding: 25px; margin-bottom: 25px; 
            border: 1px solid #1a1a1a; position: relative;
            backdrop-filter: blur(15px);
        }
        .hero-title { color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; }
        .hero-value { font-size: 2.5rem; font-weight: 800; margin: 5px 0; letter-spacing: -1px; }
        .hero-pl { font-size: 0.9rem; font-weight: 600; padding: 4px 0; }

        .btn-action { 
            position: absolute; top: 20px; right: 20px; 
            color: var(--honor-blue); font-size: 0.7rem; font-weight: bold; 
            border: 1px solid var(--honor-blue); padding: 8px 14px; border-radius: 12px;
            background: transparent; cursor: pointer;
        }

        /* 2x2 Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .card { 
            background: var(--card-bg); border-radius: 20px; padding: 18px; 
            border: 1px solid #1a1a1a; transition: transform 0.1s;
        }
        .card:active { transform: scale(0.96); }
        .ticker { font-weight: 800; font-size: 0.75rem; color: var(--honor-blue); margin-bottom: 10px; display: block; }
        .price-live { font-size: 1.3rem; font-weight: 700; }
        .pl-badge { font-size: 0.75rem; margin-top: 5px; font-weight: bold; }

        /* Horizontal Scroller */
        .scroller-wrapper { margin-bottom: 25px; }
        .scroller { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 10px; scrollbar-width: none; }
        .scroller::-webkit-scrollbar { display: none; }
        .scroll-card { min-width: 140px; background: #0a0a0a; padding: 15px; border-radius: 20px; border: 1px solid #161616; flex-shrink: 0; }

        /* Edit Overlay - Glassmorphism */
        #edit-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px); display: none;
            z-index: 3000; padding: 20px; overflow-y: auto;
        }
        .modal-content { background: #111; border-radius: 26px; padding: 25px; border: 1px solid #333; max-width: 450px; margin: auto; }
        .input-row { margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .input-row h4 { font-size: 0.8rem; color: var(--honor-blue); margin-bottom: 10px; }
        input { 
            width: 100%; background: #000; border: 1px solid #333; padding: 10px; 
            border-radius: 10px; font-size: 0.9rem; margin-top: 5px; 
        }
        label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; }

        /* Utilities */
        .pos { color: var(--status-green); }
        .neg { color: var(--status-red); }
        .section-title { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 12px; padding-left: 5px; text-transform: uppercase; letter-spacing: 1px; }

        .macro-card { background: #0a0a0a; border-left: 4px solid var(--honor-blue); padding: 15px; border-radius: 0 15px 15px 0; margin-top: 20px; font-size: 0.85rem; }
    </style>
</head>
<body>

<div id="sync-bar"><div id="sync-fill"></div></div>

<div class="container">
    <div class="header-area">
        <span style="font-size: 0.8rem; color: var(--text-dim);">Honor Minimalist Framework</span>
    </div>

    <div class="hero">
        <button class="btn-action" onclick="openEdit()">GESTISCI</button>
        <div class="hero-title">Patrimonio Stimato</div>
        <div class="hero-value" id="total-val">€ 0,00</div>
        <div class="hero-pl" id="total-pl">Dati in aggiornamento...</div>
    </div>

    <div class="section-title">Core Portfolio</div>
    <div class="grid" id="main-grid"></div>

    <div class="section-title">Liquidità & Bond</div>
    <div class="scroller-wrapper">
        <div class="scroller" id="scroll-grid"></div>
    </div>

    <div class="section-title">Commento Macro</div>
    <div class="macro-card">
        <p id="macro-text">L'app monitora i prezzi tramite API Yahoo/CorsProxy. In caso di errore API, usa il tasto GESTISCI per aggiornare i prezzi manualmente.</p>
    </div>
</div>

<!-- Modal di Modifica -->
<div id="edit-modal">
    <div class="modal-content">
        <h2 style="margin-bottom: 20px;">Gestione Asset</h2>
        <div id="edit-list"></div>
        <button onclick="saveAll()" style="width:100%; padding:15px; background:var(--honor-blue); border:none; border-radius:15px; font-weight:bold; margin-top:20px;">SALVA E AGGIORNA</button>
        <button onclick="closeEdit()" style="width:100%; padding:10px; background:transparent; border:none; color:var(--text-dim); margin-top:10px;">Chiudi</button>
    </div>
</div>

<script>
    const ETFs = [
        { id: 'VWCE.MI', type: 'grid' },
        { id: 'IWMO.MI', type: 'grid' },
        { id: 'XDEQ.MI', type: 'grid' },
        { id: 'SGLN.MI', type: 'grid' },
        { id: 'XEON.MI', type: 'scroll' },
        { id: 'IBGL.MI', type: 'scroll' },
        { id: 'VGEA.MI', type: 'scroll' }
    ];

    let portfolio = JSON.parse(localStorage.getItem('honor_invest_data')) || {};
    let currentPrices = {};

    function openEdit() {
        const list = document.getElementById('edit-list');
        list.innerHTML = '';
        ETFs.forEach(etf => {
            const d = portfolio[etf.id] || { qty: 0, pmc: 0, price: 0 };
            list.innerHTML += `
                <div class="input-row">
                    <h4>${etf.id}</h4>
                    <label>Quantità</label>
                    <input type="number" id="edit-qty-${etf.id}" value="${d.qty}" step="any">
                    <label>PMC (€)</label>
                    <input type="number" id="edit-pmc-${etf.id}" value="${d.pmc}" step="any">
                    <label>Prezzo Attuale Manuale (Opzionale)</label>
                    <input type="number" id="edit-price-${etf.id}" value="${d.price}" step="any" placeholder="Usa se API fallisce">
                </div>
            `;
        });
        document.getElementById('edit-modal').style.display = 'block';
    }

    function closeEdit() { document.getElementById('edit-modal').style.display = 'none'; }

    function saveAll() {
        ETFs.forEach(etf => {
            portfolio[etf.id] = {
                qty: parseFloat(document.getElementById(`edit-qty-${etf.id}`).value) || 0,
                pmc: parseFloat(document.getElementById(`edit-pmc-${etf.id}`).value) || 0,
                price: parseFloat(document.getElementById(`edit-price-${etf.id}`).value) || 0
            };
        });
        localStorage.setItem('honor_invest_data', JSON.stringify(portfolio));
        closeEdit();
        fetchPrices();
    }

    async function fetchPrices() {
        const fill = document.getElementById('sync-fill');
        fill.style.width = '30%';
        
        for (const etf of ETFs) {
            try {
                // Nuova strategia: Usiamo corsproxy.io che è più stabile
                const res = await fetch(`https://corsproxy.io/?https://query1.finance.yahoo.com/v8/finance/chart/${etf.id}`);
                const data = await res.json();
                const live = data.chart.result[0].meta.regularMarketPrice;
                if (live) currentPrices[etf.id] = live;
            } catch (e) {
                console.log("Errore API per " + etf.id + ", uso dati manuali/precedenti");
                // Fallback sul prezzo manuale inserito dall'utente
                currentPrices[etf.id] = portfolio[etf.id]?.price || currentPrices[etf.id] || 0;
            }
        }
        
        fill.style.width = '100%';
        renderUI();
        setTimeout(() => fill.style.width = '0%', 800);
    }

    function renderUI() {
        const grid = document.getElementById('main-grid');
        const scroll = document.getElementById('scroll-grid');
        grid.innerHTML = ''; scroll.innerHTML = '';
        
        let totalVal = 0;
        let totalCost = 0;

        ETFs.forEach(etf => {
            const d = portfolio[etf.id] || { qty: 0, pmc: 0 };
            const price = currentPrices[etf.id] || 0;
            
            const cVal = price * d.qty;
            const cCost = d.pmc * d.qty;
            totalVal += cVal;
            totalCost += cCost;

            const plPerc = d.pmc > 0 ? ((price - d.pmc) / d.pmc * 100).toFixed(2) : "0.00";
            const isPos = parseFloat(plPerc) >= 0;

            const html = `
                <div class="card">
                    <span class="ticker">${etf.id}</span>
                    <div class="price-live">€${price.toFixed(2)}</div>
                    <div class="pl-badge ${isPos?'pos':'neg'}">
                        ${isPos?'+':''}${plPerc}%
                    </div>
                </div>
            `;

            if(etf.type === 'grid') grid.innerHTML += html;
            else scroll.innerHTML += `<div class="scroll-card">${html}</div>`;
        });

        document.getElementById('total-val').innerText = `€ ${totalVal.toLocaleString('it-IT', {minimumFractionDigits:2})}`;
        const diff = (totalVal - totalCost).toFixed(2);
        const diffPerc = totalCost > 0 ? ((totalVal - totalCost) / totalCost * 100).toFixed(2) : 0;
        const plEl = document.getElementById('total-pl');
        plEl.innerText = `P&L: ${diff}€ (${diffPerc}%)`;
        plEl.className = `hero-pl ${diff >= 0 ? 'pos' : 'neg'}`;
    }

    // Inizio
    fetchPrices();
    setInterval(fetchPrices, 60000); // Aggiorna ogni minuto
</script>

</body>
</html>
